name: Run tests (public)

on:
  push:
    branches:
      - master
      - 'stable-*'
      - 'dev-*'
  pull_request:
  workflow_dispatch:

jobs:
  Linux:
    runs-on: ubuntu-latest
    if: github.repository == 'TrustTunnel/TrustTunnel'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install 1.95 --profile minimal
      - name: Run tests
        run: cargo test --workspace

  macOS:
    runs-on: macos-latest
    if: github.repository == 'TrustTunnel/TrustTunnel'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install 1.95 --profile minimal
      - name: Run tests
        run: cargo test --workspace
